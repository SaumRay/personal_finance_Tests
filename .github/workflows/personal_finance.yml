name: Finance Copilot — Playwright Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Playwright Tests (130 cases)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Create .env.test
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_REGISTER_PASSWORD: ${{ secrets.TEST_REGISTER_PASSWORD }}
          RUN_ID: ${{ github.run_id }}
        run: |
          printf 'TEST_EMAIL=%s\n' "$TEST_EMAIL" > .env.test
          printf 'TEST_PASSWORD=%s\n' "$TEST_PASSWORD" >> .env.test
          printf 'TEST_REGISTER_EMAIL=%s\n' "newuser_playwright_${RUN_ID}@gmail.com" >> .env.test
          printf 'TEST_REGISTER_PASSWORD=%s\n' "$TEST_REGISTER_PASSWORD" >> .env.test
          printf 'TEST_REGISTER_NAME=%s\n' "Playwright Tester" >> .env.test
          printf 'FRONTEND_URL=%s\n' "http://localhost:5173" >> .env.test
          printf 'API_URL=%s\n' "http://127.0.0.1:8000" >> .env.test
          echo "✅ .env.test created — keys:"
          cat .env.test | cut -d'=' -f1
          LINES=$(wc -l < .env.test)
          echo "Lines written: $LINES"
          [ "$LINES" -ge 7 ] || (echo "❌ .env.test incomplete!" && exit 1)

      - name: Start FastAPI backend
        run: nohup uvicorn src.api:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
        env:
          JWT_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in {1..40}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend ready after $i attempts!"
              break
            fi
            echo "Attempt $i/40 — HTTP $STATUS — waiting 2s..."
            sleep 2
          done
          FINAL=$(curl -s http://127.0.0.1:8000/health)
          echo "Health check: $FINAL"
          echo $FINAL | grep -q '"ok"' || (echo "❌ Backend failed" && cat backend.log && exit 1)

      - name: Register test user
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          echo "Registering: $TEST_EMAIL"
          curl -s -X POST http://127.0.0.1:8000/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_EMAIL\",\"password\":\"$TEST_PASSWORD\",\"full_name\":\"CI Test User\"}"
          echo ""

      - name: Verify test user login
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          echo "Verifying login..."
          RESPONSE=$(curl -s -X POST http://127.0.0.1:8000/auth/login \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=$TEST_EMAIL&password=$TEST_PASSWORD")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "access_token" || (echo "❌ Login failed — check TEST_EMAIL and TEST_PASSWORD secrets" && exit 1)
          echo "✅ Login verified!"

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend preview server
        working-directory: frontend
        run: nohup npm run preview -- --host 127.0.0.1 --port 5173 > ../frontend.log 2>&1 &

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend ready after $i attempts!"
              break
            fi
            echo "Attempt $i/30 — HTTP $STATUS — waiting 2s..."
            sleep 2
          done
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 || echo "000")
          [ "$FINAL" = "200" ] || (echo "❌ Frontend failed" && cat frontend.log && exit 1)
          echo "✅ Frontend is live!"

      - name: Run all Playwright tests
        run: npx playwright test --reporter=html,list
        env:
          CI: true
          JWT_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod

      - name: Show server logs on failure
        if: failure()
        run: |
          echo "====== BACKEND LOG ======"
          cat backend.log || echo "No backend log"
          echo "====== FRONTEND LOG ======"
          cat frontend.log || echo "No frontend log"

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Post test summary
        if: always()
        run: |
          echo "##  Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "|  Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "|  Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "|  Runner | ubuntu-latest |" >> $GITHUB_STEP_SUMMARY
          echo "|  Browser | Chromium |" >> $GITHUB_STEP_SUMMARY
          echo "|  Total Tests | 130 |" >> $GITHUB_STEP_SUMMARY
          echo "|  Report | Download from artifacts above |" >> $GITHUB_STEP_SUMMARY